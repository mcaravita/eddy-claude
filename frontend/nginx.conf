server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # NOTE: nginx only inherits add_header from the parent block if the child
    # location defines none of its own. Every location below sets its own
    # Cache-Control (or proxies), so the security headers are re-included
    # explicitly in each one instead of living only in this server block.

    # Vite emits hashed filenames under /assets/, safe to cache forever.
    location /assets/ {
        include security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        include security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    # Backend is not published on the host; nginx is the only entry point (AGENTS.md §4, §11).
    location /api/ {
        include security-headers.conf;
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        include security-headers.conf;
        try_files $uri $uri/ /index.html;
    }
}
